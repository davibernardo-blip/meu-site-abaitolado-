<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gartic Serverless com Firebase</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1a1a1a; color: white;
            font-family: sans-serif; height: 100vh;
            overflow: hidden; display: flex;
        }

        /* --- TELA DE LOGIN --- */
        #tela-login {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a1a1a; display: flex;
            justify-content: center; align-items: center; z-index: 100;
        }
        .caixa-login {
            background-color: #2a2a2a; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex;
            flex-direction: column; gap: 20px; width: 300px; text-align: center;
        }
        .input-login {
            padding: 12px; border-radius: 8px; border: 1px solid #444;
            background-color: #333; color: white; outline: none; font-size: 16px;
        }
        #preview-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            object-fit: cover; background-color: #444; margin: 0 auto; border: 2px solid #4caf50;
        }
        .btn-entrar {
            background-color: #4caf50; color: white; border: none;
            padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.2s;
        }
        .btn-entrar:hover { background-color: #388e3c; }

        /* --- TELA PRINCIPAL E BARRA LATERAL --- */
        #tela-principal { display: none; width: 100%; height: 100%; flex-direction: row; }
        
        .barra-lateral {
            width: 220px; background-color: #111; border-right: 1px solid #333;
            display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0;
        }
        .perfil-lateral {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            padding-bottom: 20px; border-bottom: 1px solid #333; margin-bottom: 15px;
        }
        .perfil-lateral img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #4caf50; }
        
        .menu-item {
            padding: 12px 20px; font-size: 16px; font-weight: bold; color: #aaa;
            cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .menu-item:hover, .menu-item.ativo { background-color: #2a2a2a; color: white; border-left: 4px solid #4caf50; }

        .ranking-container {
            margin-top: auto; padding: 15px; border-top: 1px solid #333;
            background-color: #0a0a0a; max-height: 200px; overflow-y: auto;
        }
        .ranking-titulo { font-size: 14px; font-weight: bold; color: #ffeb3b; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .ranking-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
        .ranking-item img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        .ranking-item .pontos { margin-left: auto; color: #4caf50; font-weight: bold; }

        /* --- ÁREA DO JOGO --- */
        .area-jogo { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #1a1a1a; }
        
        #painel-jogo {
            background-color: #2a2a2a; width: 100%; max-width: 800px; padding: 12px;
            border-radius: 10px; text-align: center; font-size: 18px; font-weight: bold;
            margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); border-bottom: 3px solid #4caf50;
        }
        
        .ferramentas { background-color: #2a2a2a; padding: 12px 25px; border-radius: 10px; display: flex; gap: 20px; align-items: center; margin-bottom: 15px; }
        label { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        canvas { background-color: white; border-radius: 10px; cursor: crosshair; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #btn-limpar { padding: 10px 15px; background-color: #b3261e; color: white; }

        /* --- CHAT --- */
        .area-chat { width: 300px; background-color: #242424; display: flex; flex-direction: column; border-left: 1px solid #333; }
        #status { padding: 15px; text-align: right; font-style: italic; font-weight: bold; font-size: 0.9em; color: #4caf50; }
        .mensagens { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg-box { display: flex; gap: 10px; align-items: flex-start; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .msg-conteudo { background-color: #333; padding: 8px 12px; border-radius: 8px; font-size: 0.9em; flex: 1; word-wrap: break-word; }
        .msg-conteudo strong { color: #4caf50; display: block; margin-bottom: 3px; font-size: 0.85em;}
        
        .controles-chat { display: flex; padding: 15px; gap: 10px; background-color: #1f1f1f; border-top: 1px solid #333; }
        .inputs-chat { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .inputs-chat input { padding: 10px; border-radius: 5px; border: 1px solid #444; background-color: #333; color: white; outline: none; }
        #btn-enviar { padding: 10px 20px; background-color: #4caf50; color: white; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="caixa-login">
            <h2 style="margin:0;">Gartic Firebase</h2>
            <img id="preview-avatar" src="https://via.placeholder.com/80?text=Foto" alt="Preview">
            <input type="url" id="input-url-imagem" class="input-login" placeholder="URL da foto de perfil">
            <input type="text" id="input-nome" class="input-login" placeholder="Seu Nome" maxlength="15">
            <button class="btn-entrar" onclick="entrarNoJogo()">Jogar Instantaneamente</button>
        </div>
    </div>

    <div id="tela-principal">
        <div class="barra-lateral">
            <div class="perfil-lateral">
                <img id="avatar-lateral" src="" alt="Avatar">
                <strong id="nome-lateral">Nome</strong>
            </div>
            <div class="menu-item ativo" id="menu-gartic">🎨 Gartic</div>
            <div class="menu-item" id="menu-chat">💬 Chat Global</div>
            
            <div class="ranking-container">
                <div class="ranking-titulo">🏆 Top Pontuação</div>
                <div id="lista-ranking"></div>
            </div>
        </div>

        <div class="area-jogo" id="area-desenho">
            <div id="painel-jogo">Carregando Firebase...</div>
            <div class="ferramentas" id="barra-ferramentas">
                <label>Cor: <input type="color" id="cor-pincel" value="#000000"></label>
                <label>Tamanho: <input type="range" id="tam-pincel" min="1" max="20" value="5"></label>
                <button id="btn-limpar">Limpar Lousa</button>
            </div>
            <canvas id="lousa" width="800" height="550"></canvas>
        </div>

        <div class="area-chat">
            <div id="status">● Firebase Conectado</div>
            <div class="mensagens" id="chat"></div>
            <div class="controles-chat">
                <div class="inputs-chat">
                    <input type="text" id="msg-texto" placeholder="Chute a palavra aqui...">
                </div>
                <button id="btn-enviar">Enviar</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ==========================================
        //  COLE AS CONFIGURAÇÕES DO SEU FIREBASE AQUI
        // ==========================================
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_AUTH_DOMAIN",
            databaseURL: "Sua_DATABASE_URL",
            projectId: "SEU_PROJECT_ID",
            storageBucket: "SEU_STORAGE_BUCKET",
            messagingSenderId: "SEU_MESSAGING_SENDER_ID",
            appId: "SUA_APP_ID"
        };
        
        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Variáveis Locais do Jogador
        const meuId = Math.random().toString(36).substring(2, 9);
        let meuNome = "Anônimo";
        let meuAvatar = "https://via.placeholder.com/80?text=Foto";
        
        // Dados de Estado do Turno Atual
        let palavraAtual = "";
        let atualDesenhistaId = "";
        let estadoJogo = "aguardando";
        let jogadoresAtuais = {};
        let amIAdmin = false;
        let podeDesenhar = false;

        const palavras = ["banana", "gato", "cachorro", "carro", "computador", "casa", "aviao", "maca", "sol", "futebol", "sorvete", "relogio", "girafa", "caneta", "livro"];

        // Preview da imagem de login
        document.getElementById('input-url-imagem').addEventListener('input', (e) => {
            meuAvatar = e.target.value.trim() || "https://via.placeholder.com/80?text=Foto";
            document.getElementById('preview-avatar').src = meuAvatar;
        });

        function entrarNoJogo() {
            const nomeDigitado = document.getElementById('input-nome').value.trim();
            if (nomeDigitado !== "") meuNome = nomeDigitado;
            
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-principal').style.display = 'flex';
            document.getElementById('nome-lateral').innerText = meuNome;
            document.getElementById('avatar-lateral').src = meuAvatar;

            // Salva sua presença no Firebase
            const meuPerfilRef = database.ref('jogadores/' + meuId);
            meuPerfilRef.set({ nome: meuNome, avatar: meuAvatar, pontos: 0 });
            
            // Remove você do banco automaticamente se fechar a aba ou cair a internet!
            meuPerfilRef.onDisconnect().remove();
        }

        // --- SISTEMA DE SINCRONIZAÇÃO DE PLACAR E TURNOS ---
        database.ref('jogadores').on('value', (snapshot) => {
            jogadoresAtuais = snapshot.val() || {};
            const ids = Object.keys(jogadoresAtuais);
            
            // O primeiro da lista vira o "Admin" para ditar as rodadas de forma organizada
            amIAdmin = (ids[0] === meuId);
            
            // Atualiza Interface de Pontuação Ordenada
            const listaRanking = document.getElementById('lista-ranking');
            listaRanking.innerHTML = "";
            const listaOrdenada = Object.values(jogadoresAtuais).sort((a, b) => b.pontos - a.pontos);
            listaOrdenada.forEach(jog => {
                const item = document.createElement('div');
                item.className = 'ranking-item';
                item.innerHTML = `<img src="${jog.avatar}"> <span>${jog.nome}</span> <span class="pontos">${jog.pontos} pts</span>`;
                listaRanking.appendChild(item);
            });

            // Se houver 2 pessoas ou mais e o jogo estiver parado, o admin inicia o turno
            if (amIAdmin && ids.length >= 2 && estadoJogo === "aguardando") {
                proximoTurno();
            }
        });

        function proximoTurno() {
            const ids = Object.keys(jogadoresAtuais);
            if(ids.length < 2) return;

            const desenhistaAleatorio = ids[Math.floor(Math.random() * ids.length)];
            const palavraAleatoria = palavras[Math.floor(Math.random() * palavras.length)];
            
            database.ref('linhas').remove(); // Apaga desenhos antigos do banco
            database.ref('jogo').set({
                desenhistaId: desenhistaAleatorio,
                desenhistaNome: jogadoresAtuais[desenhistaAleatorio].nome,
                palavra: palavraAleatoria,
                estado: "jogando",
                limpezaId: Math.random() // Força atualização de limpeza de lousa
            });
        }

        // Monitora as mudanças na rodada
        database.ref('jogo').on('value', (snapshot) => {
            const dados = snapshot.val();
            if (!dados) {
                document.getElementById('painel-jogo').innerText = "⏳ Aguardando jogadores suficientes...";
                estadoJogo = "aguardando";
                return;
            }

            estadoJogo = dados.estado;
            atualDesenhistaId = dados.desenhistaId;
            palavraAtual = dados.palavra;
            podeDesenhar = (atualDesenhistaId === meuId);

            const painelJogo = document.getElementById('painel-jogo');
            const barraFerramentas = document.getElementById('barra-ferramentas');

            if (podeDesenhar) {
                painelJogo.innerHTML = `✏️ É a sua vez! Desenhe a palavra: <span style="color:#4caf50;">${palavraAtual.toUpperCase()}</span>`;
                barraFerramentas.style.opacity = "1"; barraFerramentas.style.pointerEvents = "auto";
            } else {
                let dicas = "_ ".repeat(palavraAtual.length).trim();
                painelJogo.innerHTML = `👀 ${dados.desenhistaNome} desenhando! Palavra com ${palavraAtual.length} letras: <span style="color:#ffeb3b;">${estadoJogo === 'jogando' ? dicas : palavraAtual.toUpperCase()}</span>`;
                barraFerramentas.style.opacity = "0.4"; barraFerramentas.style.pointerEvents = "none";
            }
        });

        // --- SISTEMA DE LOUSA E DESENHO ---
        const canvas = document.getElementById('lousa');
        const ctx = canvas.getContext('2d');
        const corPincel = document.getElementById('cor-pincel');
        const tamPincel = document.getElementById('tam-pincel');
        let desenhando = false;
        let posAnterior = { x: 0, y: 0 };

        function getPosicaoMouse(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        canvas.addEventListener('mousedown', (e) => { if(!podeDesenhar) return; desenhando = true; posAnterior = getPosicaoMouse(e); });
        canvas.addEventListener('mouseup', () => desenhando = false);
        canvas.addEventListener('mouseout', () => desenhando = false);
        canvas.addEventListener('mousemove', (e) => {
            if (!desenhando || !podeDesenhar) return;
            const posAtual = getPosicaoMouse(e);
            
            // Salva o traço diretamente no Firebase
            database.ref('linhas').push({
                anterior: posAnterior, atual: posAtual, cor: corPincel.value, tamanho: tamPincel.value, autor: meuId
            });
            posAnterior = posAtual;
        });

        function desenharLinha(anterior, atual, cor, tamanho) {
            ctx.beginPath(); ctx.moveTo(anterior.x, anterior.y); ctx.lineTo(atual.x, atual.y);
            ctx.strokeStyle = cor; ctx.lineWidth = tamanho; ctx.lineCap = 'round'; ctx.stroke(); ctx.closePath();
        }

        // Escuta novas linhas enviadas por qualquer jogador
        database.ref('linhas').on('child_added', (snapshot) => {
            const linha = snapshot.val();
            desenharLinha(linha.anterior, linha.atual, linha.cor, linha.tamanho);
        });

        // Escuta limpezas de tela
        database.ref('linhas').on('child_removed', () => { ctx.clearRect(0, 0, canvas.width, canvas.height); });
        document.getElementById('btn-limpar').addEventListener('click', () => { if(podeDesenhar) database.ref('linhas').remove(); });

        // --- CHAT E SISTEMA DE CHUTES/ACERTOS ---
        const btnEnviar = document.getElementById('btn-enviar');
        const inputMsg = document.getElementById('msg-texto');
        const divChat = document.getElementById('chat');

        function enviarMensagem() {
            const msg = inputMsg.value.trim();
            if (msg === '') return;

            // Validação de acerto
            if (estadoJogo === "jogando" && !podeDesenhar && msg.toLowerCase() === palavraAtual.toLowerCase()) {
                database.ref('jogo/estado').set('acertou'); // Trava rodada para evitar duplo acerto simultâneo
                
                // Bonifica os pontos usando transações matemáticas seguras
                database.ref(`jogadores/${meuId}/pontos`).transaction(p => (p || 0) + 100);
                database.ref(`jogadores/${atualDesenhistaId}/pontos`).transaction(p => (p || 0) + 50);

                database.ref('chat').push({
                    nome: "SISTEMA", mensagem: `🎉 ${meuNome} ACERTOU! A palavra era: ${palavraAtual.toUpperCase()}!`
                });

                setTimeout(() => { if (amIAdmin) proximoTurno(); }, 3500);
            } else {
                // Mensagem convencional de chat
                database.ref('chat').push({ nome: meuNome, avatar: meuAvatar, mensagem: msg });
            }
            inputMsg.value = '';
        }

        btnEnviar.addEventListener('click', enviarMensagem);
        inputMsg.addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarMensagem(); });

        database.ref('chat').on('child_added', (snapshot) => {
            const dados = snapshot.val();
            const novaMsg = document.createElement('div');
            novaMsg.className = 'msg-box';
            
            if (dados.nome === "SISTEMA") {
                novaMsg.innerHTML = `<div class="msg-conteudo" style="background:#1b5e20; border:1px solid #4caf50; text-align:center;"><strong>${dados.nome}</strong>${dados.mensagem}</div>`;
            } else {
                novaMsg.innerHTML = `<img src="${dados.avatar}" class="msg-avatar"><div class="msg-conteudo"><strong>${dados.nome}</strong> ${dados.mensagem}</div>`;
            }
            divChat.appendChild(novaMsg); divChat.scrollTop = divChat.scrollHeight;
        });
    </script>
</body>
</html>
