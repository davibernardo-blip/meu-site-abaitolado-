<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Gartic Multiplayer</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1a1a1a; color: white;
            font-family: sans-serif; height: 100vh;
            overflow: hidden; display: flex;
        }

        /* --- TELA DE LOGIN --- */
        #tela-login {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a1a1a; display: flex;
            justify-content: center; align-items: center; z-index: 100;
        }
        .caixa-login {
            background-color: #2a2a2a; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex;
            flex-direction: column; gap: 20px; width: 300px; text-align: center;
        }
        .input-login {
            padding: 12px; border-radius: 8px; border: 1px solid #444;
            background-color: #333; color: white; outline: none; font-size: 16px;
        }
        #preview-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            object-fit: cover; background-color: #444; margin: 0 auto; border: 2px solid #4caf50;
        }
        .btn-entrar {
            background-color: #4caf50; color: white; border: none;
            padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.2s;
        }
        .btn-entrar:hover { background-color: #388e3c; }

        /* --- TELA PRINCIPAL E BARRA LATERAL --- */
        #tela-principal { display: none; width: 100%; height: 100%; flex-direction: row; }
        
        .barra-lateral {
            width: 220px; background-color: #111; border-right: 1px solid #333;
            display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0;
        }
        .perfil-lateral {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            padding-bottom: 20px; border-bottom: 1px solid #333; margin-bottom: 15px;
        }
        .perfil-lateral img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #4caf50; }
        
        .menu-item {
            padding: 12px 20px; font-size: 16px; font-weight: bold; color: #aaa;
            cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .menu-item:hover, .menu-item.ativo { background-color: #2a2a2a; color: white; border-left: 4px solid #4caf50; }

        /* --- NOVO: CONTAINER DO TOP PLACAR --- */
        .ranking-container {
            margin-top: auto; padding: 15px; border-top: 1px solid #333;
            background-color: #0a0a0a; max-height: 200px; overflow-y: auto;
        }
        .ranking-titulo { font-size: 14px; font-weight: bold; color: #ffeb3b; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .ranking-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
        .ranking-item img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        .ranking-item .pontos { margin-left: auto; color: #4caf50; font-weight: bold; }

        /* --- LADO DO JOGO --- */
        .area-jogo { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #1a1a1a; }
        
        /* NOVO: BANNER DE STATUS DO JOGO */
        #painel-jogo {
            background-color: #2a2a2a; width: 100%; max-width: 800px; padding: 12px;
            border-radius: 10px; text-align: center; font-size: 18px; font-weight: bold;
            margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); border-bottom: 3px solid #4caf50;
        }
        
        .ferramentas { background-color: #2a2a2a; padding: 12px 25px; border-radius: 10px; display: flex; gap: 20px; align-items: center; margin-bottom: 15px; }
        label { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        canvas { background-color: white; border-radius: 10px; cursor: crosshair; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #btn-limpar { padding: 10px 15px; background-color: #b3261e; color: white; }
        #btn-limpar:hover { background-color: #8c1d18; }

        /* --- LADO DO CHAT --- */
        .area-chat { width: 300px; background-color: #242424; display: flex; flex-direction: column; border-left: 1px solid #333; transition: width 0.3s, flex 0.3s; }
        #status { padding: 15px; text-align: right; font-style: italic; font-weight: bold; font-size: 0.9em; }
        .mensagens { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg-box { display: flex; gap: 10px; align-items: flex-start; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .msg-conteudo { background-color: #333; padding: 8px 12px; border-radius: 8px; font-size: 0.9em; flex: 1; word-wrap: break-word; }
        .msg-conteudo strong { color: #4caf50; display: block; margin-bottom: 3px; font-size: 0.85em;}
        .img-no-chat { max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 8px; display: block; }
        .controles-chat { display: flex; padding: 15px; gap: 10px; background-color: #1f1f1f; border-top: 1px solid #333; }
        .inputs-chat { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .inputs-chat input { padding: 10px; border-radius: 5px; border: 1px solid #444; background-color: #333; color: white; outline: none; width: 100%; box-sizing: border-box; }
        #btn-enviar { padding: 10px 20px; background-color: #4caf50; color: white; }
        #btn-enviar:hover { background-color: #388e3c; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="caixa-login">
            <h2 style="margin:0;">Entrar no Gartic</h2>
            <img id="preview-avatar" src="https://via.placeholder.com/80?text=Foto" alt="Preview">
            <label style="font-size: 14px; text-align: left;">URL do seu Avatar:</label>
            <input type="url" id="input-url-imagem" class="input-login" placeholder="Cole o URL da imagem">
            <input type="text" id="input-nome" class="input-login" placeholder="Seu Nome" maxlength="15">
            <button class="btn-entrar" onclick="entrarNoJogo()">Entrar</button>
        </div>
    </div>

    <div id="tela-principal">
        <div class="barra-lateral">
            <div class="perfil-lateral">
                <img id="avatar-lateral" src="" alt="Avatar">
                <strong id="nome-lateral" style="font-size: 18px;">Nome</strong>
            </div>
            <div class="menu-item ativo" id="menu-gartic">🎨 Gartic</div>
            <div class="menu-item" id="menu-chat">💬 Chat Global</div>
            
            <div class="ranking-container">
                <div class="ranking-titulo">🏆 Top Pontuação</div>
                <div id="lista-ranking"></div>
            </div>
        </div>

        <div class="area-jogo" id="area-desenho">
            <div id="painel-jogo">Conectando ao jogo...</div>
            
            <div class="ferramentas" id="barra-ferramentas">
                <label>Cor: <input type="color" id="cor-pincel" value="#000000"></label>
                <label>Tamanho: <input type="range" id="tam-pincel" min="1" max="20" value="5"></label>
                <button id="btn-limpar">Limpar Lousa</button>
            </div>
            <canvas id="lousa" width="800" height="550"></canvas>
        </div>

        <div class="area-chat" id="area-chat-painel">
            <div id="status">❌ Conectando...</div>
            <div class="mensagens" id="chat"></div>
            <div class="controles-chat">
                <div class="inputs-chat">
                    <input type="text" id="msg-texto" placeholder="Digite uma mensagem ou chute...">
                    <input type="url" id="msg-url-enviar" placeholder="URL da imagem no chat (opcional)" style="font-size: 12px; padding: 6px;">
                </div>
                <button id="btn-enviar">Enviar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        // --- LINKS E ABAS ---
        const LINK_DO_RENDER = "https://meu-site-abaitolado.onrender.com"; 
        const socket = io(LINK_DO_RENDER);

        const btnMenuGartic = document.getElementById('menu-gartic');
        const btnMenuChat = document.getElementById('menu-chat');
        const areaDesenho = document.getElementById('area-desenho');
        const areaChatPainel = document.getElementById('area-chat-painel');

        btnMenuGartic.addEventListener('click', () => {
            btnMenuGartic.classList.add('ativo'); btnMenuChat.classList.remove('ativo');
            areaDesenho.style.display = 'flex'; areaChatPainel.style.width = '300px'; areaChatPainel.style.flex = 'none';
        });
        btnMenuChat.addEventListener('click', () => {
            btnMenuChat.classList.add('ativo'); btnMenuGartic.classList.remove('ativo');
            areaDesenho.style.display = 'none'; areaChatPainel.style.width = 'auto'; areaChatPainel.style.flex = '1';
        });

        // --- LOGIN DO JOGO ---
        let meuNome = "Anônimo";
        let meuAvatar = "https://via.placeholder.com/80?text=Foto";

        document.getElementById('input-url-imagem').addEventListener('input', function(e) {
            meuAvatar = e.target.value.trim() || "https://via.placeholder.com/80?text=Foto";
            document.getElementById('preview-avatar').src = meuAvatar;
        });

        function entrarNoJogo() {
            const nomeDigitado = document.getElementById('input-nome').value.trim();
            if (nomeDigitado !== "") meuNome = nomeDigitado;
            
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-principal').style.display = 'flex';
            document.getElementById('nome-lateral').innerText = meuNome;
            document.getElementById('avatar-lateral').src = meuAvatar;

            // Envia as suas credenciais direto para o servidor registrar no placar
            socket.emit('entrar_jogo', { nome: meuNome, avatar: meuAvatar });
        }

        // --- SISTEMA DE MECÂNICA GARTIC (LOUSA TRAVADA) ---
        let podeDesenhar = false; 
        const canvas = document.getElementById('lousa');
        const ctx = canvas.getContext('2d');
        const corPincel = document.getElementById('cor-pincel');
        const tamPincel = document.getElementById('tam-pincel');
        const btnLimpar = document.getElementById('btn-limpar');
        const painelJogo = document.getElementById('painel-jogo');
        const barraFerramentas = document.getElementById('barra-ferramentas');

        let desenhando = false;
        let posAnterior = { x: 0, y: 0 };

        function getPosicaoMouse(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        canvas.addEventListener('mousedown', (e) => { 
            if(!podeDesenhar) return;
            desenhando = true; posAnterior = getPosicaoMouse(e); 
        });
        canvas.addEventListener('mouseup', () => desenhando = false);
        canvas.addEventListener('mouseout', () => desenhando = false);
        canvas.addEventListener('mousemove', (e) => {
            if (!desenhando || !podeDesenhar) return;
            const posAtual = getPosicaoMouse(e);
            desenharLinha(posAnterior, posAtual, corPincel.value, tamPincel.value);
            socket.emit('desenhar', { anterior: posAnterior, atual: posAtual, cor: corPincel.value, tamanho: tamPincel.value });
            posAnterior = posAtual;
        });

        function desenharLinha(anterior, atual, cor, tamanho) {
            ctx.beginPath(); ctx.moveTo(anterior.x, anterior.y); ctx.lineTo(atual.x, atual.y);
            ctx.strokeStyle = cor; ctx.lineWidth = tamanho; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke(); ctx.closePath();
        }

        socket.on('desenhar', (dados) => { desenharLinha(dados.anterior, dados.atual, dados.cor, dados.tamanho); });
        btnLimpar.addEventListener('click', () => { if(podeDesenhar) { limparTela(); socket.emit('limpar'); } });
        function limparTela() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        socket.on('limpar', limparTela);

        // --- ESCUTANDO EVENTOS DO JUIZ (SERVER) ---
        
        // Recebe o novo turno do servidor
        socket.on('novo_turno', (dados) => {
            limparTela();
            podeDesenhar = dados.eODesenhista;
            
            if (podeDesenhar) {
                painelJogo.innerHTML = `✏️ É a sua vez! Desenhe a palavra: <span style="color:#4caf50;">${dados.palavra.toUpperCase()}</span>`;
                barraFerramentas.style.opacity = "1";
                barraFerramentas.style.pointerEvents = "auto";
            } else {
                painelJogo.innerHTML = `👀 ${dados.desenhista} está desenhando! Palavra: <span style="color:#ffeb3b;">${dados.palavra}</span>`;
                barraFerramentas.style.opacity = "0.4";
                barraFerramentas.style.pointerEvents = "none";
            }
        });

        // Recebe atualização de placar
        socket.on('atualizar_placar', (jogadores) => {
            const listaRanking = document.getElementById('lista-ranking');
            listaRanking.innerHTML = "";
            
            // Transforma o objeto em Array e organiza do maior ponto para o menor
            const listaOrdenada = Object.values(jogadores).sort((a, b) => b.pontos - a.pontos);
            
            listaOrdenada.forEach(jog => {
                const item = document.createElement('div');
                item.className = 'ranking-item';
                item.innerHTML = `
                    <img src="${jog.avatar}" alt="Avatar">
                    <span>${jog.nome}</span>
                    <span class="pontos">${jog.pontos} pts</span>
                `;
                listaRanking.appendChild(item);
            });
        });

        socket.on('status_jogo', (dados) => {
            painelJogo.innerHTML = dados.msg;
        });

        // --- SISTEMA DE CHAT ---
        const btnEnviar = document.getElementById('btn-enviar');
        const inputMsg = document.getElementById('msg-texto');
        const inputUrlImagemChat = document.getElementById('msg-url-enviar');
        const divChat = document.getElementById('chat');
        const statusDiv = document.getElementById('status');

        socket.on('connect', () => { statusDiv.innerHTML = '✅ Online'; statusDiv.style.color = '#4caf50'; });
        socket.on('connect_error', () => { statusDiv.innerHTML = '❌ Servidor Offline'; statusDiv.style.color = '#b3261e'; });

        function enviarMensagem() {
            const msg = inputMsg.value.trim();
            const urlImgChat = inputUrlImagemChat.value.trim();
            if (msg !== '' || urlImgChat !== '') {
                socket.emit('chat', { nome: meuNome, avatar: meuAvatar, mensagem: msg, imagemEnviada: urlImgChat });
                inputMsg.value = ''; inputUrlImagemChat.value = '';
            }
        }
        btnEnviar.addEventListener('click', enviarMensagem);
        inputMsg.addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarMensagem(); });

        socket.on('chat', (dados) => {
            const novaMsg = document.createElement('div');
            novaMsg.className = 'msg-box';
            let tagImagemEnviada = dados.imagemEnviada ? `<img src="${dados.imagemEnviada}" class="img-no-chat">` : "";
            
            // Destaca mensagens do sistema (como avisos de acerto)
            if (dados.nome === "SISTEMA") {
                novaMsg.innerHTML = `<div class="msg-conteudo" style="background:#1b5e20; border:1px solid #4caf50; text-align:center;"><strong>${dados.nome}</strong>${dados.mensagem}</div>`;
            } else {
                novaMsg.innerHTML = `
                    <img src="${dados.avatar}" class="msg-avatar">
                    <div class="msg-conteudo">
                        <strong>${dados.nome}</strong> ${dados.mensagem} ${tagImagemEnviada}
                    </div>
                `;
            }
            divChat.appendChild(novaMsg); divChat.scrollTop = divChat.scrollHeight;
        });
    </script>
</body>
</html>
